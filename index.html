<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPE — Plataforma de Gestión RSE</title>
  <style>
    :root {
      --primary:       #2D6A4F;
      --primary-dark:  #1B4332;
      --primary-light: #40916C;
      --accent:        #52B788;
      --accent-light:  #95D5B2;
      --surface:       #D8F3DC;
      --bg:            #F4F9F4;
      --white:         #FFFFFF;
      --text:          #1B2D2A;
      --text-muted:    #4A6741;
      --border:        #B7E4C7;
      --danger:        #D62839;
      --shadow:        0 2px 10px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; }

    /* ── SIDEBAR ────────────────────────────────────── */
    .sidebar { width: 256px; min-width: 256px; background: var(--primary-dark); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; }
    .sb-head { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sb-logo { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: var(--accent-light); }
    .sb-sub  { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.4); margin-top: 2px; }
    .sb-company { margin: 14px 20px 0; padding: 10px 14px; background: rgba(255,255,255,.07); border-radius: 8px; }
    .sb-company small { font-size: 10px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: 1px; }
    .sb-company strong { display: block; font-size: 13px; color: #fff; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-progress { margin: 14px 20px 0; }
    .sb-prog-bar { background: rgba(255,255,255,.1); border-radius: 4px; height: 4px; }
    .sb-prog-fill { height: 4px; border-radius: 4px; background: var(--accent); transition: width .5s ease; }
    .sb-prog-txt { font-size: 10px; color: rgba(255,255,255,.35); margin-top: 5px; }
    .sb-nav { padding: 16px 0; flex: 1; }
    .sb-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.3); padding: 6px 20px 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; cursor: pointer; transition: background .15s; position: relative; }
    .nav-item:hover { background: rgba(255,255,255,.05); }
    .nav-item.active { background: rgba(82,183,136,.18); }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
    .nav-step { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; color: rgba(255,255,255,.5); }
    .nav-step.done { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nav-step.curr { border-color: var(--accent); color: var(--accent); }
    .nav-title { font-size: 13px; font-weight: 500; color: #fff; }
    .nav-desc  { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 1px; }
    .sb-foot { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.08); font-size: 10px; color: rgba(255,255,255,.25); }

    /* ── MAIN ───────────────────────────────────────── */
    .main { margin-left: 256px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .tb-left .tb-bread { font-size: 12px; color: var(--text-muted); }
    .tb-left .tb-title { font-size: 17px; font-weight: 700; color: var(--primary-dark); margin-top: 2px; }
    .tb-right { display: flex; gap: 8px; align-items: center; }
    .content { flex: 1; padding: 28px 32px; }

    /* ── CARDS ──────────────────────────────────────── */
    .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
    .card-head { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--primary-dark); display: flex; align-items: center; gap: 8px; }
    .card-icon { width: 30px; height: 30px; background: var(--surface); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .card-body { padding: 22px; }
    .card-body-flush { padding: 0; }

    /* ── STATS ROW ──────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    .stat-val  { font-size: 26px; font-weight: 800; color: var(--primary); line-height: 1; }
    .stat-lbl  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── FORM ───────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    label .hint { font-weight: 400; text-transform: none; color: var(--text-muted); }
    label .req  { color: var(--danger); }
    textarea, input[type="text"], input[type="number"], select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 14px; color: var(--text); background: #fff; outline: none; transition: border-color .2s;
    }
    textarea:focus, input:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 96px; }
    .input-err { border-color: var(--danger) !important; }
    .err-msg { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }
    .err-msg.show { display: block; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .input-pfx { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .input-pfx:focus-within { border-color: var(--accent); }
    .pfx-label { background: var(--bg); padding: 9px 12px; font-size: 13px; color: var(--text-muted); border-right: 1.5px solid var(--border); white-space: nowrap; }
    .input-pfx input { border: none; border-radius: 0; }

    /* ── TAGS ───────────────────────────────────────── */
    .tags-wrap { border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 6px; min-height: 44px; cursor: text; }
    .tags-wrap:focus-within { border-color: var(--accent); }
    .tag { background: var(--surface); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .tag-x { cursor: pointer; font-size: 14px; line-height: 1; color: var(--primary-light); }
    .tag-x:hover { color: var(--danger); }
    .tag-input { border: none !important; outline: none; padding: 4px 6px; font-size: 13px; flex: 1; min-width: 120px; background: transparent; color: var(--text); }

    /* ── BUTTONS ────────────────────────────────────── */
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    .btn-primary   { background: var(--primary);  color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-accent    { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--primary-light); }
    .btn-danger    { background: #fff; color: var(--danger); border: 1.5px solid #ffd0d3; }
    .btn-danger:hover { background: #fff4f5; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-xs { padding: 4px 9px; font-size: 11px; }
    .btn-group { display: flex; gap: 8px; }

    /* ── TABLE ──────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); border-bottom: 2px solid var(--border); white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 1px solid var(--bg); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafcfa; }

    /* ── BADGES ─────────────────────────────────────── */
    .badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-blue  { background: #dce8f8; color: #1a4e8c; }
    .badge-gray  { background: #e9ecef; color: #495057; }

    /* ── LEVEL DOTS ─────────────────────────────────── */
    .lvl { display: flex; align-items: center; gap: 5px; }
    .lvl-dots { display: flex; gap: 3px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
    .dot.on { background: var(--accent); }

    /* ── ACTIONS BAR ────────────────────────────────── */
    .actions-bar { background: #fff; border-top: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; bottom: 0; z-index: 10; }
    .actions-hint { font-size: 12px; color: var(--text-muted); }

    /* ── MODAL ──────────────────────────────────────── */
    .modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
    .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.2); }
    .modal-wide { max-width: 820px; }
    .modal-head { padding: 20px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-ttl  { font-size: 15px; font-weight: 700; color: var(--primary-dark); }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
    .modal-close:hover { background: var(--bg); }
    .modal-body { padding: 22px; }
    .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    /* ── CONFIRM ────────────────────────────────────── */
    .confirm-ov { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 600; }
    .confirm-box { background: #fff; border-radius: 12px; padding: 28px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
    .confirm-icon { font-size: 36px; margin-bottom: 12px; }
    .confirm-ttl  { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .confirm-msg  { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5; }

    /* ── INFO BOX ───────────────────────────────────── */
    .info-box { background: #eaf4fb; border: 1px solid #b8d9f5; border-radius: 8px; padding: 11px 14px; font-size: 13px; color: #1a5276; margin-bottom: 18px; line-height: 1.5; }

    /* ── TOAST ──────────────────────────────────────── */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .toast { padding: 11px 18px; border-radius: 9px; font-size: 13px; font-weight: 600; color: #fff; box-shadow: 0 6px 20px rgba(0,0,0,.18); display: flex; align-items: center; gap: 8px; animation: toastIn .25s ease; }
    .toast.ok  { background: var(--primary); }
    .toast.err { background: var(--danger); }
    @keyframes toastIn { from { transform: translateX(110%); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── MATRIX ─────────────────────────────────────── */
    .matrix-grid { display: grid; grid-template-columns: 28px 1fr 1fr; grid-template-rows: 1fr 1fr 28px; gap: 4px; height: 240px; }
    .mx-yaxis { grid-row: 1 / 3; display: flex; align-items: center; justify-content: center; }
    .mx-yaxis span { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .mx-q { border-radius: 8px; padding: 6px; position: relative; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 4px; }
    .mx-qlabel { position: absolute; top: 5px; left: 7px; font-size: 10px; font-weight: 700; color: rgba(0,0,0,.35); }
    .mx-dots { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 4px; }
    .mx-q1 { background: #d1ecf1; }
    .mx-q2 { background: #d4edda; }
    .mx-q3 { background: #f8d7da; }
    .mx-q4 { background: #fff3cd; }
    .mx-xaxis { grid-column: 2 / 4; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .mx-dot { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: default; }
    .mx-dot-sec { background: var(--primary-light); }
    .mx-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .mx-leg-item { font-size: 12px; color: var(--text-muted); }
    .mx-leg-item strong { color: var(--primary); }

    /* ── ODS CHIPS ──────────────────────────────────── */
    .ods-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .ods-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: var(--bg); color: var(--text-muted); cursor: pointer; border: 1.5px solid var(--border); transition: all .15s; user-select: none; }
    .ods-chip.sel { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── CHECKBOX GROUP ─────────────────────────────── */
    .chk-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chk-item { display: flex; align-items: center; gap: 6px; padding: 5px 11px; border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500; }
    .chk-item input { width: auto; margin: 0; }
    .chk-item:has(input:checked) { border-color: var(--accent); background: var(--surface); color: var(--primary); }

    /* ── EMPTY STATE ────────────────────────────────── */
    .empty { text-align: center; padding: 44px 24px; color: var(--text-muted); }
    .empty-ic { font-size: 38px; margin-bottom: 10px; }
    .empty p  { font-size: 13px; margin-bottom: 14px; }

    /* ── FILTER BAR ─────────────────────────────────── */
    .filter-bar { display: flex; align-items: center; gap: 8px; padding: 14px 22px; border-bottom: 1px solid var(--bg); }
    .filter-bar select { width: auto; max-width: 260px; }

    /* ── SUMMARY ────────────────────────────────────── */
    .sum-section h3 { font-size: 14px; font-weight: 700; color: var(--primary-dark); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--surface); }
    .sum-section { margin-bottom: 22px; }
    .sum-field { margin-bottom: 10px; }
    .sum-field strong { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: .4px; display: block; margin-bottom: 3px; }
    .sum-field span { font-size: 13px; color: var(--text); line-height: 1.5; }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .sidebar { width: 56px; min-width: 56px; }
      .sb-head, .sb-company, .sb-progress, .nav-desc, .nav-title, .sb-label, .sb-foot { display: none; }
      .nav-item { justify-content: center; padding: 14px; }
      .main { margin-left: 56px; }
      .stats-row { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ─── SIDEBAR ─────────────────────────────────────────── -->
<nav class="sidebar">
  <div class="sb-head">
    <div class="sb-logo">EPE</div>
    <div class="sb-sub">Plataforma de Gestión RSE</div>
  </div>
  <div class="sb-company">
    <small>Empresa</small>
    <strong id="sbCompany">—</strong>
  </div>
  <div class="sb-progress">
    <div class="sb-prog-bar"><div class="sb-prog-fill" id="sbProg" style="width:0%"></div></div>
    <div class="sb-prog-txt" id="sbProgTxt">0% completado</div>
  </div>
  <div class="sb-nav">
    <div class="sb-label">Navegación</div>
    <div class="nav-item" id="nav-setup" onclick="go('setup')">
      <div class="nav-step" id="step-setup">⚙</div>
      <div><div class="nav-title">Configuración</div><div class="nav-desc">Datos de empresa</div></div>
    </div>
    <div class="nav-item" id="nav-mod1" onclick="go('mod1')">
      <div class="nav-step" id="step-mod1">1</div>
      <div><div class="nav-title">Compromiso RSE</div><div class="nav-desc">Misión · Visión · Valores</div></div>
    </div>
    <div class="nav-item" id="nav-mod2" onclick="go('mod2')">
      <div class="nav-step" id="step-mod2">2</div>
      <div><div class="nav-title">Stakeholders</div><div class="nav-desc">Análisis de partes interesadas</div></div>
    </div>
    <div class="nav-item" id="nav-mod3" onclick="go('mod3')">
      <div class="nav-step" id="step-mod3">3</div>
      <div><div class="nav-title">Actividades RSE</div><div class="nav-desc">Programas y proyectos</div></div>
    </div>
  </div>
  <div class="sb-foot">v1.0 MVP · Datos en localStorage</div>
</nav>

<!-- ─── MAIN ─────────────────────────────────────────────── -->
<main class="main">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-bread" id="tbBread">EPE</div>
      <div class="tb-title" id="tbTitle">Plataforma de Gestión RSE</div>
    </div>
    <div class="tb-right">
      <button class="btn btn-secondary btn-sm" onclick="doExport()">↓ Exportar JSON</button>
      <button class="btn btn-danger btn-sm" onclick="askReset()">↺ Reiniciar</button>
    </div>
  </div>
  <div class="content" id="app"></div>
</main>

<!-- ─── TOAST ─────────────────────────────────────────────── -->
<div class="toast-wrap" id="toasts"></div>

<!-- ─── MODAL ─────────────────────────────────────────────── -->
<div class="modal-ov hidden" id="modalOv" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <div class="modal-ttl" id="modalTtl"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- ─── CONFIRM ───────────────────────────────────────────── -->
<div class="confirm-ov hidden" id="confirmOv">
  <div class="confirm-box">
    <div class="confirm-icon" id="cfmIcon">⚠️</div>
    <div class="confirm-ttl"  id="cfmTtl"></div>
    <div class="confirm-msg"  id="cfmMsg"></div>
    <div class="btn-group" style="justify-content:center">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger"    id="cfmBtn">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
const PRIMARY_SK = [
  { id:'sk1', nombre:'Propietarios / Accionistas', tipo:'Primario', influencia:5, interes:5,
    expectativas:'Rentabilidad, sostenibilidad y cumplimiento normativo', canal:'Reportes anuales, juntas directivas', built:true },
  { id:'sk2', nombre:'Gerencia', tipo:'Primario', influencia:5, interes:4,
    expectativas:'Eficiencia operativa, crecimiento y reputación corporativa', canal:'Reuniones internas, reportes de gestión', built:true },
  { id:'sk3', nombre:'Empleados', tipo:'Primario', influencia:3, interes:5,
    expectativas:'Condiciones laborales, desarrollo profesional y bienestar', canal:'Comunicaciones internas, encuestas de clima', built:true },
  { id:'sk4', nombre:'Clientes', tipo:'Primario', influencia:4, interes:4,
    expectativas:'Calidad, transparencia y productos responsables', canal:'Atención al cliente, redes sociales', built:true },
  { id:'sk5', nombre:'Proveedores', tipo:'Primario', influencia:3, interes:3,
    expectativas:'Pagos a tiempo y relaciones comerciales estables', canal:'Contratos, reuniones de seguimiento', built:true },
  { id:'sk6', nombre:'Medio Ambiente', tipo:'Primario', influencia:2, interes:5,
    expectativas:'Reducción de impacto ambiental y prácticas sostenibles', canal:'Reportes ambientales, auditorías', built:true },
];

const BLANK = {
  company: { name:'', sector:'', size:'' },
  mod1: { mision:'', vision:'', valores:[], done:false },
  mod2: { stakeholders: PRIMARY_SK.map(s=>({...s})), done:false },
  mod3: { actividades:[], done:false },
  cur: 'setup'
};

let S = deep(BLANK);
let editId = null;
let cfmCb  = null;

function deep(o){ return JSON.parse(JSON.stringify(o)); }

// ── Persistence ──────────────────────────────────────────────
function save(){ try{ localStorage.setItem('epe_v1', JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    const d = localStorage.getItem('epe_v1');
    if(d){ S = { ...deep(BLANK), ...JSON.parse(d) }; }
  } catch(e){ S = deep(BLANK); }
}

// ── Navigation ───────────────────────────────────────────────
function go(mod){
  S.cur = mod; save(); render();
}

function render(){
  updateSidebar();
  updateTopbar();
  const el = document.getElementById('app');
  switch(S.cur){
    case 'setup': el.innerHTML = viewSetup(); break;
    case 'mod1':  el.innerHTML = viewMod1();  break;

function updateSidebar(){

    mod1:  S.mod1.done,
    mod2:  S.mod2.done,
    mod3:  S.mod3.done,
  };
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+S.cur)?.classList.add('active');
  ['setup','mod1','mod2','mod3'].forEach(k=>{

    if(!el) return;

  document.getElementById('sbProg').style.width = pct+'%';
  document.getElementById('sbProgTxt').textContent = pct+'% completado';
}

function onTagKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v = e.target.value.trim().replace(/,/g,'');
    if(v && !S.mod1.valores.includes(v)){ S.mod1.valores.push(v); e.target.value=''; refreshTags(); }
  } else if(e.key==='Backspace' && e.target.value==='' && S.mod1.valores.length){
    S.mod1.valores.pop(); refreshTags();
  }
}
function removeTag(i){ S.mod1.valores.splice(i,1); refreshTags(); }
function refreshTags(){
  const w = document.getElementById('tags-wrap');
  if(!w) return;
  const html = S.mod1.valores.map((v,i)=>
    `<span class="tag">${x(v)}<span class="tag-x" onclick="removeTag(${i})">×</span></span>`
  ).join('');
  w.innerHTML = html + `<input type="text" class="tag-input" id="tag-in"
    placeholder="${S.mod1.valores.length?'Agregar otro...':'Ej: Integridad...'}"
    onkeydown="onTagKey(event)">`;
  document.getElementById('tag-in').focus();
}
function saveMod1(next){
  const mision = document.getElementById('f-mision').value.trim();
  const vision = document.getElementById('f-vision').value.trim();
  const tagIn  = document.getElementById('tag-in').value.trim();
  if(tagIn && !S.mod1.valores.includes(tagIn)){ S.mod1.valores.push(tagIn); }

  let ok = true;
  const setErr = (id, errId, cond) => {
    document.getElementById(id).classList.toggle('input-err', !cond);
    document.getElementById(errId).classList.toggle('show', !cond);
    if(!cond) ok=false;
  };
  setErr('f-mision','e-mision', !!mision);
  setErr('f-vision', 'e-vision', !!vision);
  if(!S.mod1.valores.length){ document.getElementById('e-valores').classList.add('show'); ok=false; }
  else document.getElementById('e-valores').classList.remove('show');

  if(!ok){ toast('Completá todos los campos requeridos','err'); return; }

  S.mod1.mision = mision;
  S.mod1.vision = vision;
  S.mod1.done   = true;
  save(); toast('Módulo 1 guardado ✓','ok');
  if(next) setTimeout(()=>go('mod2'),500);
}

function dots(n){
  let h = '<div class="lvl"><div class="lvl-dots">';
  for(let i=1;i<=5;i++) h+=`<div class="dot ${i<=n?'on':''}"></div>`;
  return h+`</div><span style="font-size:11px;color:var(--text-muted)">${n}/5</span></div>`;
}

function renderMatrix(){
  const sks = S.mod2.stakeholders;
  if(!sks.length) return '<p style="color:var(--text-muted);text-align:center;font-size:13px">Agregá stakeholders para ver la matriz</p>';
  const q = s => {
    const hi = s.influencia>=3, hj = s.interes>=3;
    if(hi&&hj) return 'q2';
    if(!hi&&hj) return 'q1';
    if(hi&&!hj) return 'q4';
    return 'q3';
  };
  const byQ = {q1:[],q2:[],q3:[],q4:[]};
  sks.forEach((s,i)=>byQ[q(s)].push({...s,n:i+1}));
  const qdots = k => byQ[k].map(s=>`<div class="mx-dot ${s.tipo==='Secundario'?'mx-dot-sec':''}" title="${x(s.nombre)} (Inf:${s.influencia}, Int:${s.interes})">${s.n}</div>`).join('');
  const qbox = (k,lbl,clr) =>
    `<div class="mx-q mx-${k}"><div class="mx-qlabel">${lbl}</div><div class="mx-dots">${qdots(k)}</div></div>`;

  return `
  <div class="matrix-grid">
    <div class="mx-yaxis"><span>Influencia ↑</span></div>
    ${qbox('q4','Mantener satisfechos','#fff3cd')}
    ${qbox('q2','Gestionar de cerca','#d4edda')}
    ${qbox('q3','Monitorear','#f8d7da')}
    ${qbox('q1','Mantener informados','#d1ecf1')}
    <div></div>
    <div class="mx-xaxis" style="grid-column:2/4">Interés →</div>
  </div>
  <div class="mx-legend">
    ${sks.map((s,i)=>`<span class="mx-leg-item"><strong>${i+1}</strong> ${x(s.nombre)}</span>`).join(' · ')}
  </div>`;
}

  const data = {
    nombre, tipo: document.getElementById('sk-tipo').value,
    influencia: inf, interes: int_,
    expectativas: document.getElementById('sk-exp').value.trim(),
    canal: document.getElementById('sk-canal').value.trim(),
  };
  if(editId){
    const i = S.mod2.stakeholders.findIndex(s=>s.id===editId);
    if(i>=0) S.mod2.stakeholders[i] = {...S.mod2.stakeholders[i],...data};
  } else {
    S.mod2.stakeholders.push({...data, id:'sk'+Date.now(), built:false});
  }
  save(); closeModal(); toast(editId?'Stakeholder actualizado':'Stakeholder agregado','ok');
  render();

  <div class="info-box">📋 <strong>SDG Compass Pasos 3 y 4 · RSE-PDCA Fase 3</strong> — Registrá programas y proyectos RSE. Vincultálos con stakeholders y ODS.</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">${acts.length}</div><div class="stat-lbl">Actividades registradas</div></div>
    <div class="stat-card"><div class="stat-val">${progs}</div><div class="stat-lbl">Programas distintos</div></div>
    <div class="stat-card"><div class="stat-val">${total>0?'$'+total.toLocaleString('es-AR'):'—'}</div><div class="stat-lbl">Presupuesto total</div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title"><div class="card-icon">🚀</div>Actividades RSE</div>
      <button class="btn btn-accent btn-sm" onclick="openActModal()">+ Agregar actividad</button>
    </div>
    ${sks.length?`
    <div class="filter-bar">
      <label style="margin:0;white-space:nowrap;text-transform:none;font-size:13px">Filtrar por stakeholder:</label>
      <select id="m3-filter" onchange="render()" style="max-width:260px">
        <option value="">— Todos —</option>${skOpts}
      </select>
      ${fSk?`<button class="btn btn-secondary btn-sm" onclick="document.getElementById('m3-filter').value='';render()">✕</button>`:''}
    </div>`:''}
    <div class="card-body-flush">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Programa</th><th>Proyecto / Acción</th><th>Objetivos</th><th>Stakeholders</th><th>Presupuesto</th><th>Indicador</th><th>ODS</th><th>Acciones</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>
  ${Object.keys(allOds).length?`
  <div class="card">
    <div class="card-head"><div class="card-title"><div class="card-icon">🌍</div>ODS Cubiertos</div></div>
    <div class="card-body">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Objetivos de Desarrollo Sostenible vinculados a las actividades registradas:</div>
      <div class="ods-grid">
        ${Object.entries(allOds).map(([o,n])=>`<span class="ods-chip sel">ODS ${o} <strong>(${n})</strong></span>`).join('')}
      </div>
    </div>
  </div>`:''}
  <div class="actions-bar">
    <div class="actions-hint">${S.mod3.done?'✅ Módulo finalizado':`${acts.length} actividad(es) registrada(s)`}</div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="saveMod3(false)">Guardar borrador</button>
      <button class="btn btn-accent"    onclick="openSummary()">📄 Ver resumen</button>
      <button class="btn btn-primary"   onclick="saveMod3(true)">✓ Finalizar módulo</button>
    </div>
  </div>`;
}

function openActModal(id){
  editId = id||null;
  const a  = id ? S.mod3.actividades.find(k=>k.id===id) : null;
  const sks = S.mod2.stakeholders;
  const skChks = sks.map(s=>`
    <label class="chk-item">
      <input type="checkbox" value="${s.id}" ${(a?.sks||[]).includes(s.id)?'checked':''}> ${x(s.nombre)}
    </label>`).join('');
  const odsChips = ODS.map((o,i)=>{
    const n=String(i+1);
    return `<span class="ods-chip ${(a?.ods||[]).includes(n)?'sel':''}" onclick="this.classList.toggle('sel')" data-n="${n}">ODS ${n}</span>`;
  }).join('');
  document.getElementById('modalTtl').textContent = a?'Editar Actividad RSE':'Nueva Actividad RSE';
  document.getElementById('modalBox').className = 'modal modal-wide';
  document.getElementById('modalBody').innerHTML = `
    <div class="two-col">
      <div class="form-group">
        <label>Programa <span class="req">*</span> <span class="hint">— Iniciativa macro</span></label>
        <input type="text" id="ac-prog" value="${x(a?.programa||'')}" placeholder="Ej: Programa Empleo Joven 2025">
      </div>
      <div class="form-group">
        <label>Proyecto / Acción <span class="req">*</span></label>
        <input type="text" id="ac-proy" value="${x(a?.proyecto||'')}" placeholder="Ej: Capacitación en habilidades digitales">
      </div>
    </div>
    <div class="form-group">
      <label>Objetivos <span class="hint">— Alineá con ODS específicos</span></label>
      <textarea id="ac-obj" style="min-height:68px" placeholder="Describe los objetivos de este proyecto RSE...">${x(a?.objetivos||'')}</textarea>
    </div>
    <div class="two-col">
      <div class="form-group">
        <label>Presupuesto</label>
        <div class="input-pfx">
          <span class="pfx-label">$ ARS</span>
          <input type="number" id="ac-pres" min="0" step="1000" value="${a?.presupuesto??''}" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label>Indicador / KPI</label>
        <input type="text" id="ac-kpi" value="${x(a?.indicador||'')}" placeholder="Ej: % empleados capacitados">
      </div>
    </div>
    ${sks.length?`
    <div class="form-group">
      <label>Stakeholders vinculados</label>
      <div class="chk-group" id="sk-chks">${skChks}</div>
    </div>`:''}
    <div class="form-group">
      <label>ODS vinculados <span class="hint">— Hacé clic para seleccionar</span></label>
      <div class="ods-grid" id="ods-sel">${odsChips}</div>
    </div>`;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary"   onclick="saveAct()">Guardar actividad</button>`;
  openModal();
}
function saveAct(){
  const prog = document.getElementById('ac-prog').value.trim();
  const proy = document.getElementById('ac-proy').value.trim();
  if(!prog||!proy){ toast('Programa y proyecto son requeridos','err'); return; }
  const pres = document.getElementById('ac-pres').value;
  if(pres && isNaN(Number(pres))){ toast('El presupuesto debe ser numérico','err'); return; }
  const sksLinked = [...document.querySelectorAll('#sk-chks input:checked')].map(c=>c.value);
  const odsLinked = [...document.querySelectorAll('#ods-sel .ods-chip.sel')].map(c=>c.dataset.n);
  const data = {
    programa: prog, proyecto: proy,
    objetivos: document.getElementById('ac-obj').value.trim(),
    presupuesto: pres ? Number(pres) : null,
    indicador: document.getElementById('ac-kpi').value.trim(),
    sks: sksLinked, ods: odsLinked,
  };
  if(editId){
    const i = S.mod3.actividades.findIndex(a=>a.id===editId);
    if(i>=0) S.mod3.actividades[i]={...S.mod3.actividades[i],...data};
  } else {
    S.mod3.actividades.push({...data, id:'act'+Date.now()});
  }
  save(); closeModal(); toast(editId?'Actividad actualizada':'Actividad agregada','ok'); render();
}
function askDelAct(id){
  const a = S.mod3.actividades.find(k=>k.id===id);
  showConfirm('¿Eliminar actividad?',`Se eliminará "${a?.programa} — ${a?.proyecto}".`,()=>{
    S.mod3.actividades = S.mod3.actividades.filter(k=>k.id!==id);
    save(); toast('Actividad eliminada','ok'); render();
  });
}
function saveMod3(fin){
  S.mod3.done = fin || S.mod3.actividades.length>0;
  save();
  toast(fin?'Módulo 3 finalizado ✅':'Borrador guardado','ok');
  if(fin) setTimeout(()=>go('setup'),600);
}

// ════════════════════════════════════════════════════════════
// SUMMARY
// ════════════════════════════════════════════════════════════
function openSummary(){
  const {company, mod1, mod2, mod3} = S;
  const sks  = mod2.stakeholders;
  const acts = mod3.actividades;
  const skRows = sks.map(s=>`<tr>
    <td>${x(s.nombre)}</td><td><span class="badge ${s.tipo==='Primario'?'badge-green':'badge-blue'}">${s.tipo}</span></td>
    <td>${s.influencia}/5</td><td>${s.interes}/5</td>
    <td style="font-size:12px">${x(s.expectativas)}</td><td style="font-size:12px">${x(s.canal)}</td>
  </tr>`).join('');
  const actRows = acts.map(a=>{
    const skN = (a.sks||[]).map(sid=>sks.find(s=>s.id===sid)?.nombre).filter(Boolean).join(', ');
    return `<tr>
      <td><strong>${x(a.programa)}</strong></td><td>${x(a.proyecto)}</td>
      <td style="font-size:12px">${x(a.objetivos)}</td>
      <td style="font-size:12px">${skN||'—'}</td>
      <td>${a.presupuesto?'$'+Number(a.presupuesto).toLocaleString('es-AR'):'—'}</td>
      <td style="font-size:12px">${x(a.indicador)||'—'}</td>
      <td style="font-size:11px">${(a.ods||[]).map(o=>`ODS ${o}`).join(', ')||'—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('modalTtl').textContent = `📄 Resumen RSE — ${company.name||'Empresa'}`;
  document.getElementById('modalBox').className = 'modal modal-wide';
  document.getElementById('modalBody').innerHTML = `
    <div class="sum-section">
      <h3>🏢 Empresa</h3>
      <div class="sum-field"><strong>Nombre</strong><span>${x(company.name)||'—'}</span></div>
      <div class="two-col">
        <div class="sum-field"><strong>Sector</strong><span>${x(company.sector)||'—'}</span></div>
        <div class="sum-field"><strong>Tamaño</strong><span>${company.size||'—'}</span></div>
      </div>
    </div>
    <div class="sum-section">
      <h3>🎯 Módulo 1 — Compromiso RSE</h3>
      <div class="sum-field"><strong>Misión</strong><span>${x(mod1.mision)||'No completado'}</span></div>
      <div class="sum-field"><strong>Visión</strong><span>${x(mod1.vision)||'No completado'}</span></div>
      <div class="sum-field"><strong>Valores</strong><span>${mod1.valores.length?mod1.valores.map(v=>`<span class="tag" style="display:inline-flex;margin:2px">${x(v)}</span>`).join(' '):'No completado'}</span></div>
    </div>
    <div class="sum-section">
      <h3>👥 Módulo 2 — Stakeholders (${sks.length})</h3>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Tipo</th><th>Inf.</th><th>Int.</th><th>Expectativas</th><th>Canal</th></tr></thead>
          <tbody>${skRows||'<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:20px">Sin registros</td></tr>'}</tbody>
        </table>
      </div>
    </div>
    <div class="sum-section">
      <h3>🚀 Módulo 3 — Actividades RSE (${acts.length})</h3>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Programa</th><th>Proyecto</th><th>Objetivos</th><th>Stakeholders</th><th>Presupuesto</th><th>Indicador</th><th>ODS</th></tr></thead>
          <tbody>${actRows||'<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:20px">Sin registros</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    <button class="btn btn-primary"   onclick="window.print()">🖨️ Imprimir / PDF</button>`;
  openModal();
}

// EXPORT / RESET
// ════════════════════════════════════════════════════════════
function doExport(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'),{href:url,download:`EPE_RSE_${(S.company.name||'datos').replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.json`});
  a.click(); URL.revokeObjectURL(url);
  toast('Datos exportados','ok');
}
function askReset(){
  showConfirm('¿Reiniciar todo?','Se eliminarán todos los datos ingresados. No se puede deshacer.',()=>{
    localStorage.removeItem('epe_v1');
    S = deep(BLANK);
    toast('Datos reiniciados','ok');
    go('setup');
  },'🗑️','Reiniciar');
}

// ════════════════════════════════════════════════════════════
// MODAL / CONFIRM / TOAST / UTILS
// ════════════════════════════════════════════════════════════
function openModal(){ document.getElementById('modalOv').classList.remove('hidden'); document.getElementById('modalBox').className='modal'; }
function closeModal(){ document.getElementById('modalOv').classList.add('hidden'); editId=null; }

function showConfirm(ttl,msg,cb,icon='⚠️',btn='Eliminar'){
  document.getElementById('cfmTtl').textContent  = ttl;
  document.getElementById('cfmMsg').textContent  = msg;
  document.getElementById('cfmIcon').textContent = icon;
  document.getElementById('cfmBtn').textContent  = btn;
  cfmCb = cb;
  document.getElementById('confirmOv').classList.remove('hidden');
}
function closeConfirm(){ document.getElementById('confirmOv').classList.add('hidden'); cfmCb=null; }
document.getElementById('cfmBtn').addEventListener('click',()=>{ if(cfmCb){cfmCb();closeConfirm();} });

function toast(msg,type='ok'){
  const el = document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=(type==='ok'?'✓ ':'⚠ ')+msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function x(s){ // XSS-safe escape
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeConfirm(); }
});

// INIT
// ════════════════════════════════════════════════════════════
load();
go(S.cur||'setup');
</script>
